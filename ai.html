<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>

    <style>
        body {
            background-color: #fff1f1;
            font-family: Georgia, 'Times New Roman', Times, serif;
            text-align: center;
            margin: 20px;
            padding: 20px;
            color: #ffffff;
        }

        h1 {
            color: #000000;
            text-decoration: underline;
        }

        nav a {
            color: #000000;
            font-family: Georgia, 'Times New Roman', Times, serif;
            font-size: 14px;
        }

        #game-box {
            border: 2px solid #74e06c;
            margin: 20px auto;
            padding: 20px;
            max-width: 420px;
        }

        canvas {
            background-color: #0f0f1a;
            display: block;
            margin: 0 auto;
            border: 2px solid #fc8484;
        }

        #score-box {
            border: 2px solid #fc8484;
            margin: 20px auto;
            padding: 15px;
            max-width: 420px;
            color: #000000;
            font-size: 18px;
        }

        #button-box {
            border: 2px solid #e06c6c;
            margin: 20px auto;
            padding: 15px;
            max-width: 420px;
        }

        button {
            background-color: #ee7979;
            color: #1a1a2e;
            font-family: Georgia, 'Times New Roman', Times, serif;
            font-size: 16px;
            padding: 10px 24px;
            margin: 8px;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #78e454;
            color: #ffffff;
        }

        #instructions-box {
            border: 2px solid #79e963;
            margin: 20px auto;
            padding: 15px;
            max-width: 420px;
            color: #000000;
            font-size: 14px;
        }

        #message {
            color: #c084fc;
            font-size: 18px;
            font-style: italic;
            min-height: 28px;
        }
    </style>
</head>
<body>

    <h1>Snake Game</h1>

    <div id="score-box">
        <p>Score: <span id="score">0</span> &nbsp;|&nbsp; High Score: <span id="highscore">0</span></p>
        <p id="message">Press Start to Play!</p>
    </div>

    <div id="game-box">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
    </div>

    <div id="button-box">
        <button onclick="startGame()">Start</button>
        <button onclick="pauseGame()">Pause</button>
        <button onclick="resetGame()">Reset</button>
    </div>

    <div id="instructions-box">
        <p>Use the <strong>Arrow Keys</strong> on your keyboard to control the snake.<br>
        Eat the <span style="color:#e0c46c;">gold food</span> to grow and score points.<br>
        Don't hit the walls or yourself!</p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const box = 20;
        const canvasSize = 400;

        let snake, direction, food, score, gameLoop, running, paused;
        let highScore = 0;

        function initGame() {
            snake = [
                { x: 9 * box, y: 10 * box },
                { x: 8 * box, y: 10 * box },
                { x: 7 * box, y: 10 * box }
            ];
            direction = { x: box, y: 0 };
            food = spawnFood();
            score = 0;
            document.getElementById('score').textContent = score;
            document.getElementById('message').textContent = '';
            running = false;
            paused = false;
        }

        function spawnFood() {
            let pos;
            do {
                pos = {
                    x: Math.floor(Math.random() * (canvasSize / box)) * box,
                    y: Math.floor(Math.random() * (canvasSize / box)) * box
                };
            } while (snake.some(s => s.x === pos.x && s.y === pos.y));
            return pos;
        }

        function draw() {
            ctx.fillStyle = '#0f0f1a';
            ctx.fillRect(0, 0, canvasSize, canvasSize);

            // Food
            ctx.fillStyle = '#e0c46c';
            ctx.fillRect(food.x, food.y, box, box);

            // Snake
            snake.forEach((segment, index) => {
                ctx.fillStyle = index === 0 ? '#c084fc' : '#7c3aed';
                ctx.fillRect(segment.x, segment.y, box, box);
                ctx.strokeStyle = '#1a1a2e';
                ctx.strokeRect(segment.x, segment.y, box, box);
            });
        }

        function update() {
            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

            // Wall collision
            if (head.x < 0 || head.x >= canvasSize || head.y < 0 || head.y >= canvasSize) {
                endGame();
                return;
            }

            // Self collision
            if (snake.some(s => s.x === head.x && s.y === head.y)) {
                endGame();
                return;
            }

            snake.unshift(head);

            // Ate food
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                if (score > highScore) {
                    highScore = score;
                    document.getElementById('highscore').textContent = highScore;
                }
                food = spawnFood();
            } else {
                snake.pop();
            }

            draw();
        }

        function startGame() {
            if (running && !paused) return;
            if (paused) {
                paused = false;
                document.getElementById('message').textContent = '';
                gameLoop = setInterval(update, 120);
                return;
            }
            running = true;
            document.getElementById('message').textContent = '';
            gameLoop = setInterval(update, 120);
        }

        function pauseGame() {
            if (!running || paused) return;
            paused = true;
            clearInterval(gameLoop);
            document.getElementById('message').textContent = 'Paused';
        }

        function resetGame() {
            clearInterval(gameLoop);
            initGame();
            draw();
            document.getElementById('message').textContent = 'Press Start to Play!';
        }

        function endGame() {
            clearInterval(gameLoop);
            running = false;
            document.getElementById('message').textContent = 'Game Over! Press Start to play again.';
            initGame();
            draw();
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowUp' && direction.y === 0) direction = { x: 0, y: -box };
            if (e.key === 'ArrowDown' && direction.y === 0) direction = { x: 0, y: box };
            if (e.key === 'ArrowLeft' && direction.x === 0) direction = { x: -box, y: 0 };
            if (e.key === 'ArrowRight' && direction.x === 0) direction = { x: box, y: 0 };
        });

        initGame();
        draw();
    </script>

</body>
</html>
